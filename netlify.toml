[build]
  command = "echo 'Static deploy'"
  publish = "public"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/referidos"
  to = "/referidos/index.html"
  status = 200

[[redirects]]
  from = "/referidos/dashboard"
  to = "/referidos/dashboard.html"
  status = 200

[[redirects]]
  from = "/logo-firma"
  to = "/logo-firma.png"
  status = 301

[[redirects]]
  from = "/logo-email"
  to = "/logo-email.png"
  status = 301

[[redirects]]
  from = "/logo"
  to = "/logo.png"
  status = 301


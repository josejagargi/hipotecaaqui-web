[build]
  publish = "public"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/referidos"
  to = "/referidos/index.html"
  status = 200

[[redirects]]
  from = "/referidos/dashboard"
  to = "/referidos/dashboard.html"
  status = 200
